<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prissy Princess - Cybersecurity Profile</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
            letter-spacing: 1px;
        }

        .profile-photo {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            border: 4px solid #fff;
        }

        .profile-photo:hover {
            box-shadow: 0 0 25px 7px #00aaff, 0 4px 15px rgba(0,0,0,0.3);
            transform: scale(1.05);
        }

        .caption {
            margin-top: 20px;
            font-size: 1.1em;
            color: #555;
            max-width: 400px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>Prissy Princess</h1>
    <img src="PPhoto.png" alt="" class="profile-photo">
    <div class="caption">
        Cybersecurity Student | Information Security | Risk & Threat Analysis
    </div>
</body>
</html>
