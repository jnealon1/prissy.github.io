<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prissy Princess - Professional Profile</title>
    <style>
        /* Center everything vertically and horizontally */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
            letter-spacing: 1px;
        }

        /* Profile photo styling */
        .profile-photo {
            width: 250px;
            height: 250px;
            border-radius: 50%; /* perfectly round */
            object-fit: cover; /* crop image to circle */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); /* subtle shadow */
            border: 4px solid #fff;
        }

        /* Caption styling */
        .caption {
            margin-top: 20px;
            font-size: 1.1em;
            color: #555;
            max-width: 400px; /* wraps nicely under photo */
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>Prissy Princess</h1>
    <img src="PPhoto.png" alt="Prissy Profile Photo" class="profile-photo">
    <div class="caption">
        Cybersecurity Student | Information Security | Risk & Threat Analysis
    </div>
</body>
</html>
