<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prissy Princess - Cybersecurity Profile</title>
    <style>
        /* Reset and center everything more precisely */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            text-align: center; /* ensures text is centered */
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
            letter-spacing: 1px; /* small spacing for elegance */
        }

        /* Profile photo styling */
        .profile-photo {
            width: 250px;
            height: 250px;
            border-radius: 50%; /* make it perfectly round */
            object-fit: cover; /* crop to fill circle */
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); /* subtle shadow */
            transition: all 0.3s ease;
            border: 4px solid #fff;
        }

        /* Hover glow effect */
        .profile-photo:hover {
            box-shadow: 0 0 25px 7px #00aaff, 0 4px 15px rgba(0,0,0,0.3);
            transform: scale(1.05); /* subtle zoom */
        }

        /* Caption styling */
        .caption {
            margin-top: 20px;
            font-size: 1.1em;
            color: #555;
            max-width: 400px; /* wrap text nicely */
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>Prissy Princess</h1>
    <img src="PPhoto.png" alt="Prissy Profile Photo" class="profile-photo">
    <div class="caption">
        Cybersecurity Student | Information Security | Risk & Threat Analysis
    </div>
</body>
</html>
