
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prissy Princess | Cybersecurity Portfolio</title>

<!-- Font Awesome -->
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

<style>
/* GENERAL */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f4f9;
    color: #333;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    position: fixed;
    left: 0;
    top: 0;
    height: 100%;
    background-color: #2c2f48;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 20px;
    text-align: center;
}

/* PROFILE PHOTO */
.profile-photo {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    border: 3px solid #fff;
    transition: all 0.3s ease;
}

.profile-photo:hover {
    box-shadow: 0 0 30px 8px #00aaff;
    transform: scale(1.05);
}

.sidebar h2 {
    margin: 10px 0 5px 0;
}

.sidebar p {
    font-size: 14px;
    margin-bottom: 15px;
    color: #b0b3c6;
}

/* ICON LINKS */
.icon-links {
    display: flex;
    gap: 15px;
    margin-bottom: 10px;
}

.icon-link {
    color: white;
    font-size: 22px;
    text-decoration: none;
}

.icon-link:hover {
    color: #4da6ff;
}

/* MINIMAL RESUME LINK */
.resume-link {
    margin-top: 5px;
    color: #b0b3c6;
    text-decoration: none;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding-bottom: 4px;
    border-bottom: 2px solid transparent;
    transition: all 0.3s ease;
}

.resume-link:hover {
    color: #4da6ff;
    border-bottom: 2px solid #4da6ff;
}

/* MAIN CONTENT */
.main-content {
    margin-left: 240px;
    padding: 40px;
    flex: 1;
}

/* NAV */
.nav-links {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
}

.nav-links a {
    color: #2c2f48;
    text-decoration: none;
    padding: 8px 12px;
    border-bottom: 2px solid transparent;
}

.nav-links a:hover {
    border-bottom: 2px solid #4da6ff;
}

/* SECTIONS */
section {
    margin-bottom: 50px;
    padding: 20px;
    background: white;
    border-radius: 8px;
    border-left: 6px solid #4da6ff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.job {
    margin-bottom: 25px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    body {
        flex-direction: column;
    }
    .main-content {
        margin-left: 0;
        padding: 20px;
    }
    .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        flex-direction: row;
        justify-content: space-around;
    }
    .sidebar img {
        width: 80px;
        height: 80px;
    }
    .sidebar h2, .sidebar p {
        display: none;
    }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <img src="Images/PPhoto.png" alt="Prissy Princess" class="profile-photo">

    <h2>Prissy Princess</h2>
    <p>Cybersecurity Student | Information Security | Risk & Threat Analysis</p>

    <div class="icon-links">
        <a href="https://github.com/YourGitHubUsername" target="_blank" class="icon-link">
            <i class="fab fa-github"></i>
        </a>
        <a href="mailto:youremail@example.com" class="icon-link">
            <i class="fas fa-envelope"></i>
        </a>
    </div>

    <!-- CLEAN RESUME LINK -->
    <a href="resume.pdf" download class="resume-link">
        <i class="fas fa-download"></i> Resume
    </a>
</div>
